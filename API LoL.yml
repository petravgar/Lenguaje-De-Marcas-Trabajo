opencollection: 1.0.0
info:
  name: API LoL
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ''
      port: ''
      auth:
        username: ''
        password: ''
      bypassProxy: ''
items:
  - info:
      name: Crear Campeon
      type: http
      seq: 2
    http:
      method: POST
      url: http://localhost:3000/campeones/5
      body:
        type: json
        data: |-
          {
            "nombre": "Ahri",
            "rol": "Mago",
            "dificultad": 2,
            "daño": "Mágico",
            "linea": "Mid",
            "esMelee": false,
            "region": "Jonia"
          }
      auth: inherit
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
  - info:
      name: Eliminar un campeon
      type: http
      seq: 4
    http:
      method: DELETE
      url: http://localhost:3000/campeones/2
      auth: inherit
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
  - info:
      name: Untitled
      type: http
      seq: 1
    http:
      method: GET
      url: ''
